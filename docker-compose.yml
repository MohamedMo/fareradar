# FareRadar — full stack
# ══════════════════════════════════════════════════════════════
#   docker compose up -d --build
#
# Services:
#   scanner    — runs the scan loop, writes to ./data/fareradar_v2.db
#   api        — FastAPI backend, reads the same DB on port 8000
#   dashboard  — nginx serving the built React app on port 8080,
#                proxying /api/* to the api service
#
# First-time setup:
#   cp .env.example .env    # fill in your API keys
#   docker compose up -d --build
#   open http://localhost:8080

services:
  scanner:
    build: .
    container_name: fareradar-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/fareradar_v2.db
    volumes:
      - ./data:/app/data
    command: ["python", "src/scanner.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/fareradar_v2.db').execute('SELECT 1')"]
      interval: 5m
      timeout: 10s
      retries: 3

  api:
    build: .
    container_name: fareradar-api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/fareradar_v2.db
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      - scanner

  dashboard:
    build: ./dashboard
    container_name: fareradar-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
